<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personajes de Dragon Ball</title>
    <script src="../js/main.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<!--
    



    Perdón si hay mucho tailwind pero he aprovechado para practicarlo
    (Odio el diseño y el diseñar)



    Si ves que en algunas clases pongo saltos de línea es para poder verlas
    mejor y no tener que estar de izquierda a derecha







-->

<body
    class="
        bg-[url('../img/background.jpg')] 
        bg-fixed 
        bg-cover 
        bg-center
        text-gray-100 
        min-h-screen 
        max-h-full 
    ">

    <div class="fixed z-50 top-4 left-4 w-32 h-12 flex justify-center items-center rounded-xl bg-orange-600 hover:bg-orange-500 shadow-lg border-2 border-orange-400 transition duration-300">
        <a href="/portfolio-daniel-rives-sivila/proyectos" class="text-white font-bold w-full h-full flex items-center justify-center">
            Volver
        </a>
    </div>

    <style>
        @font-face {
            font-family: "Saiyan-Sans";
            src: url("../public/fonts/Saiyan-Sans\ Left\ Oblique.ttf");
        }
    </style>

    <header 
        class="
            text-center 
            mb-8 
            pb-3 
            flex 
            flex-col 
            justify-center 
            items-center 
            w-full
        ">
        <img src="../img/logo.png" alt="Logo Dragon Ball" class="h-48">
        <p class="text-8xl text-yellow-300" style="font-family: Saiyan-Sans;">Personajes</p>
    </header>


    <div id="personajes" 
        class="
            grid 
            grid-cols-1 
            p-4 
            gap-6 
            sm:grid-cols-2 
            lg:grid-cols-3 
            xl:grid-cols-5
        ">
        
    </div>
